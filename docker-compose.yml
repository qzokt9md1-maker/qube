version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: qube-postgres
    environment:
      POSTGRES_USER: qube
      POSTGRES_PASSWORD: qube_dev_password
      POSTGRES_DB: qube
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qube"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qube-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: qube-meilisearch
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: qube_search_dev_key
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
